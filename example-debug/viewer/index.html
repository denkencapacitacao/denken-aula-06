<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Task Factory Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: #f4f6f8;
            color: #1f2937;
        }

        .card {
            width: min(720px, calc(100vw - 32px));
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 24px;
        }

        h1 {
            margin-top: 0;
        }

        code {
            background: #eef2ff;
            padding: 2px 6px;
            border-radius: 6px;
        }

        pre {
            background: #111827;
            color: #e5e7eb;
            padding: 16px;
            border-radius: 12px;
            overflow: auto;
            min-height: 160px;
        }

        button {
            border: 0;
            background: #2563eb;
            color: white;
            padding: 10px 14px;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Task Factory Viewer</h1>
        <p>
            Este viewer está sendo servido pelo <strong>Nginx</strong> e consome a API em
            <code>/api/health</code>.
        </p>

        <div class="actions">
            <button id="reload">Atualizar status</button>
            <span id="status">Aguardando resposta da API...</span>
        </div>

        <pre id="output">Carregando...</pre>
    </main>

    <script src="/app.js"></script>
</body>
</html>
