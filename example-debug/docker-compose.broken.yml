version: "3.9"

services:
  api:
    image: swarm-lab-api:1.0.0
    networks:
      - backend
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    user: "1000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL

  web:
    image: swarm-lab-viewer:1.0.0
    ports:
      - "8080:80"
    networks:
      - frontend
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

networks:
  backend:
    driver: overlay

  frontend:
    driver: overlay
